<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI PPTX Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-dark: #4f46e5;
            --bg: #0f0f17;
            --card: #1a1a2e;
            --text: #e2e8f0;
            --text-light: #94a3b8;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 20%);
        }
        .container { max-width: 1100px; margin: 0 auto; padding: 2rem; }
        header { text-align: center; margin-bottom: 3rem; padding-top: 3rem; }
        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            background: linear-gradient(90deg, #a78bfa, #818cf8, #60a5fa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }
        .subtitle { font-size: 1.3rem; color: var(--text-light); font-weight: 500; }
        .main-card {
            background: var(--card);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 2rem; }
        @media (max-width: 768px) { .form-grid { grid-template-columns: 1fr; } h1 { font-size: 2.8rem; } }
        label { display: block; margin-bottom: 0.5rem; font-weight: 600; color: #c4b5fd; }
        input, select {
            width: 100%;
            padding: 1rem 1.2rem;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
        input::placeholder { color: #666; }
        .btn-group { display: flex; gap: 1rem; margin-top: 2rem; flex-wrap: wrap; }
        button {
            padding: 1rem 2.5rem;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 200px;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none !important;
        }
        .btn-preview {
            background: linear-gradient(135deg, #8b5cf6, #6366f1);
            color: white;
            box-shadow: 0 10px 20px rgba(139,92,246,0.3);
        }
        .btn-preview:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(139,92,246,0.4); }
        .btn-download { background: linear-gradient(135deg, #10b981, #059669); color: white; display: none; }
        .btn-download.show { display: inline-block; animation: slideUp 0.6s ease; }
        .btn-download:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 20px 40px rgba(16,185,129,0.4); }
        .loading { text-align: center; padding: 3rem; display: none; }
        .loading.show { display: block; }
        .spinner {
            width: 60px; height: 60px;
            border: 5px solid rgba(99,102,241,0.2);
            border-top: 5px solid #8b5cf6;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 1rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .preview { margin-top: 3rem; display: none; }
        .preview.show { display: block; animation: slideUp 0.8s ease; }
        .preview-header { text-align: center; margin-bottom: 2rem; }
        .preview-title { font-size: 2.2rem; font-weight: 700; margin-bottom: 0.5rem; color: #a78bfa; }
        .slides-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(360px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
        .slide-card {
            background: rgba(255,255,255,0.03);
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.08);
            transition: all 0.3s;
        }
        .slide-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .slide-header {
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .slide-title { font-weight: 600; font-size: 1.1rem; }
        .slide-num { background: rgba(255,255,255,0.2); padding: 4px 10px; border-radius: 20px; font-size: 0.9rem; }
        .slide-bullets { padding: 1.2rem; list-style: none; }
        .slide-bullets li {
            padding: 0.6rem 0;
            position: relative;
            padding-left: 1.8rem;
            font-size: 0.95rem;
            line-height: 1.5;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .slide-bullets li:last-child { border-bottom: none; }
        .slide-bullets li::before {
            content: "▹";
            color: #8b5cf6;
            position: absolute;
            left: 0.5rem;
            font-weight: bold;
        }
        .footer {
            text-align: center;
            margin-top: 4rem;
            color: var(--text-light);
            font-size: 0.9rem;
        }
        .success-msg {
            background: rgba(16, 185, 129, 0.2);
            border: 1px solid #10b981;
            padding: 1rem;
            border-radius: 12px;
            text-align: center;
            margin-top: 1rem;
            display: none;
        }
        .success-msg.show { display: block; animation: slideUp 0.5s ease; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>AI PPTX Generator</h1>
            <p class="subtitle">Create stunning presentations in seconds — powered by Groq AI</p>
        </header>

        <div class="main-card">
            <div class="form-grid">
                <div>
                    <label>Topic / Title</label>
                    <input type="text" id="topic" placeholder="e.g., Future of AI in Healthcare 2025" required>
                </div>
                <div>
                    <label>Number of Slides</label>
                    <select id="num_slides">
                        <option value="5">5 Slides</option>
                        <option value="6" selected>6 Slides</option>
                        <option value="7">7 Slides</option>
                        <option value="8">8 Slides</option>
                        <option value="10">10 Slides</option>
                        <option value="12">12 Slides</option>
                    </select>
                </div>
            </div>

            <div class="btn-group">
                <button class="btn-preview" id="previewBtn" onclick="generate()">Generate Preview</button>
                <button class="btn-download" id="downloadBtn" onclick="download()">Download PPTX</button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>AI is crafting your masterpiece... This takes 8-15 seconds</p>
            </div>

            <div class="success-msg" id="successMsg">
                ✅ Presentation ready! Click "Download PPTX" to save.
            </div>
        </div>

        <div class="preview" id="preview">
            <div class="preview-header">
                <h2 class="preview-title" id="title"></h2>
                <p id="subtitle"></p>
            </div>
            <div class="slides-container" id="slides"></div>
        </div>

        <div class="footer">
            Created by NIHIT
        </div>
    </div>

    <script>
        let downloadKey = null;

        async function generate() {
            const topic = document.getElementById('topic').value.trim();
            const slides = document.getElementById('num_slides').value;

            if (!topic) {
                alert('Please enter a topic!');
                return;
            }

            // Disable button and show loading
            document.getElementById('previewBtn').disabled = true;
            document.getElementById('previewBtn').textContent = "Generating...";
            document.getElementById('loading').classList.add('show');
            document.getElementById('preview').classList.remove('show');
            document.getElementById('downloadBtn').classList.remove('show');
            document.getElementById('successMsg').classList.remove('show');
            downloadKey = null;

            try {
                const form = new FormData();
                form.append('topic', topic);
                form.append('num_slides', slides);

                const res = await fetch('/preview', { method: 'POST', body: form });
                const data = await res.json();

                if (res.ok) {
                    downloadKey = data.download_key || null;
                    document.getElementById('title').textContent = data.title;
                    document.getElementById('subtitle').textContent = data.subtitle || '';

                    const container = document.getElementById('slides');
                    container.innerHTML = data.slides.map((s, i) => `
                        <div class="slide-card">
                            <div class="slide-header">
                                <div class="slide-title">${s.title}</div>
                                <div class="slide-num">${i + 1}</div>
                            </div>
                            <ul class="slide-bullets">
                                ${s.bullets.map(b => `<li>${b}</li>`).join('')}
                            </ul>
                        </div>
                    `).join('');

                    document.getElementById('preview').classList.add('show');
                    if (downloadKey) {
                        document.getElementById('downloadBtn').classList.add('show');
                        document.getElementById('successMsg').classList.add('show');
                    } else {
                        alert('Warning: no download available. Try again.');
                    }
                } else {
                    alert(data.detail || 'Something went wrong');
                }
            } catch (err) {
                alert('Network error: ' + err.message);
            } finally {
                document.getElementById('loading').classList.remove('show');
                document.getElementById('previewBtn').disabled = false;
                document.getElementById('previewBtn').textContent = "Generate Preview";
            }
        }

        async function download() {
            const btn = document.getElementById('downloadBtn');
            if (!downloadKey) {
                alert('No presentation ready. Generate preview first.');
                return;
            }
            btn.textContent = "Downloading...";
            btn.disabled = true;

            try {
                const form = new FormData();
                form.append('key', downloadKey);

                const res = await fetch('/download', { method: 'POST', body: form });
                
                if (res.ok) {
                    const blob = await res.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'presentation.pptx';
                    document.body.appendChild(a);
                    a.click();
                    document.body.removeChild(a);
                    window.URL.revokeObjectURL(url);
                } else {
                    const data = await res.json();
                    alert(data.detail || 'Download failed. Generate preview first!');
                }
            } catch (err) {
                alert('Download error: ' + err.message);
            } finally {
                btn.textContent = "Download PPTX";
                btn.disabled = false;
            }
        }

        // Allow Enter key to generate
        document.getElementById('topic').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                generate();
            }
        });
    </script>
</body>
</html>
